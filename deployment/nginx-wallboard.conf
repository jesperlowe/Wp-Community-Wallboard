# Wallboard — reverse proxy foran den lokale Node-service på 127.0.0.1:3000.
# Samme origin for frontend og API, så browseren aldrig laver et CORS-kald.
#
# LAN-ADGANG ER IKKE AKTIVERET SOM STANDARD.
# "listen 127.0.0.1:80;" betyder at KUN selve Raspberry Pi'en kan nå
# wallboardet (http://127.0.0.1/ — det er den URL kiosk-scriptet bruger).
#
# For at gøre wallboardet tilgængeligt på det lokale netværk (se README.md,
# afsnittet "LAN-adgang"):
#   1. Ændr linjen "listen 127.0.0.1:80;" nedenfor til enten "listen 80;"
#      (alle interfaces) eller en specifik LAN-IP, fx "listen 192.168.1.50:80;".
#   2. Åbn porten i firewallen, fx: sudo ufw allow 80/tcp
#   3. Genindlæs Nginx: sudo systemctl reload nginx
#
# Cockpit kører uafhængigt på port 9090 (https://<host>:9090/) og er ikke
# berørt af denne fil — wallboard og Cockpit har bevidst separate URL'er.
server {
	listen 127.0.0.1:80;
	listen [::1]:80;
	server_name _;

	server_tokens off;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_connect_timeout 5s;
		proxy_read_timeout 15s;
	}

	# Wallboardet er read-only og har ingen administrationsflade — men
	# bloker eksplicit adgang til konfigurations-/cachefiler, hvis nogen
	# skulle gætte en sti direkte mod Nginx (Node-appen serverer dem aldrig
	# selv, dette er et ekstra hærdningslag).
	location ~ /\.env {
		deny all;
		return 404;
	}

	location ~ ^/(server|deployment|test)/ {
		deny all;
		return 404;
	}
}
